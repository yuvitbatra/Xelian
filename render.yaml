# Render blueprint for the Xelian registry (H-225, free tier).
# Set the secret env vars in the Render dashboard after the first deploy:
#   DATABASE_URL                  from Neon (free tier)
#   XELIAN_R2_*                   from Cloudflare R2 (archives MUST live in R2 —
#                                 Render free-tier disks are ephemeral)
# Keep-warm: point a free UptimeRobot monitor at /health every 5 minutes.
#
# AFTER DEPLOY — point the CLI at production. The shipped `xelian` binary
# defaults to http://localhost:8000, so release builds MUST bake the deployed
# URL in at compile time, or every `xelian run` hits localhost and fails:
#   XELIAN_DEFAULT_REGISTRY_URL=https://<your-service>.onrender.com \
#     cargo install --path crates/xelian-cli
# (Users can also override per-shell with `export XELIAN_REGISTRY_URL=...`.)
services:
  - type: web
    name: xelian-registry
    runtime: docker
    plan: free
    rootDir: registry
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: XELIAN_R2_BUCKET
        sync: false
      - key: XELIAN_R2_ENDPOINT
        sync: false
      - key: XELIAN_R2_ACCESS_KEY_ID
        sync: false
      - key: XELIAN_R2_SECRET_ACCESS_KEY
        sync: false
